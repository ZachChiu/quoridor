  <line x1="4" y1="20" x2="28" y2="20" stroke="#D1D1D1" stroke-width="0.5"/>
  
  <!-- 棋子 -->
  <circle cx="8" cy="8" r="3" fill="#FF9999"/>
  <circle cx="24" cy="24" r="3" fill="#FF9999"/>
  <circle cx="24" cy="8" r="3" fill="#99CCFF"/>
