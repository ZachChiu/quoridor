name: Gemini PR Review

on:
  pull_request:
    branches:
      - main
      - dev
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to review
        required: true
        type: number

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.inputs.pr_number }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

permissions:
  contents: read
  id-token: write
  issues: write
  pull-requests: write
  statuses: write

jobs:
  review:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 7

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve PR context
        id: pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_PR_NUMBER: ${{ github.event.inputs.pr_number }}
          PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            PR_NUMBER="${WORKFLOW_PR_NUMBER}"
          else
            PR_NUMBER="${PULL_REQUEST_NUMBER}"
          fi

          echo "pr_number=${PR_NUMBER}" >> "${GITHUB_OUTPUT}"
          echo "repository=${REPOSITORY}" >> "${GITHUB_OUTPUT}"

          PR_DATA="$(gh pr view "${PR_NUMBER}" --repo "${REPOSITORY}" --json title,body,additions,deletions,changedFiles,baseRefName,headRefName)"
          {
            echo "pr_data<<EOF"
            echo "${PR_DATA}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

          CHANGED_FILES="$(gh pr diff "${PR_NUMBER}" --repo "${REPOSITORY}" --name-only)"
          {
            echo "changed_files<<EOF"
            echo "${CHANGED_FILES}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Run Gemini PR review
        id: gemini
        uses: google-github-actions/run-gemini-cli@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          gemini_cli_version: ${{ vars.GEMINI_CLI_VERSION || 'latest' }}
          gemini_model: gemini-2.5-flash
          settings: |-
            {
              "maxSessionTurns": 20,
              "coreTools": [
                "run_shell_command(echo)",
                "run_shell_command(gh pr view)",
                "run_shell_command(gh pr diff)",
                "run_shell_command(cat)",
                "run_shell_command(head)",
                "run_shell_command(tail)",
                "run_shell_command(grep)"
              ],
              "telemetry": {
                "enabled": false,
                "target": "gcp"
              }
            }
          prompt: |-
            ## PR Context
            Repository: ${{ steps.pr.outputs.repository }}
            PR Number: ${{ steps.pr.outputs.pr_number }}

            PR Data:
            ${{ steps.pr.outputs.pr_data }}

            Changed Files:
            ${{ steps.pr.outputs.changed_files }}

            ## 角色
            你是一位資深程式碼審查助手。請逐檔審查這個 PR，並產出可直接轉成 GitHub inline review comments 的結構化結果。

            ## 語言要求
            - 所有輸出一律使用繁體中文（zh-TW）。
            - 嚴禁使用英文作為主要回覆語言，除非是程式碼、指令、檔名、API 名稱或必要技術名詞。

            ## 審查原則
            1. 先閱讀上方的 PR metadata 與 changed files。
            2. 執行 `gh pr diff "${{ steps.pr.outputs.pr_number }}" --repo "${{ steps.pr.outputs.repository }}"` 檢查 patch。
            3. 若需要補充上下文，只能針對變更相關檔案使用 `cat`、`head`、`tail`、`grep`。
            4. 只指出真實且可執行的問題：功能錯誤、回歸風險、正確性問題、安全性問題、型別/API 誤用，或明顯的維護性風險。
            5. 只針對 diff hunk 內、且仍存在於 PR head 版本的行做評論；不要評論未變更位置。
            6. 每個 finding 只講一個問題，內容精簡、具體、可執行。
            7. 如果沒有可執行的問題，`findings` 回傳空陣列。

            ## 行號要求
            - `line` 必須填入 PR diff 中可評論的「新檔案版本」行號。
            - 只使用單行評論，不要輸出 multi-line range。
            - `path` 必須是 repository root 相對路徑，例如 `app/components/PlayClient.tsx`。

            ## 嚴重度對應
            - `high`：高風險，應優先修正
            - `medium`：中等風險，應安排修正
            - `low`：低風險，可後續改善

            ## 輸出格式
            只能輸出 JSON，不能有 markdown code fence、不能有前言、不能有額外說明。
            JSON schema 如下：
            {
              "summary": "繁體中文的一句話總結",
              "overall": "繁體中文的 1-3 句 review 總結",
              "findings": [
                {
                  "path": "相對路徑",
                  "line": 123,
                  "severity": "high | medium | low",
                  "title": "繁體中文短標題",
                  "body": "繁體中文評論內容，一段即可"
                }
              ]
            }

      - name: Create inline review comments
        if: ${{ success() }}
        uses: actions/github-script@v8
        env:
          GEMINI_SUMMARY: ${{ steps.gemini.outputs.summary }}
          GEMINI_RESPONSE: ${{ steps.gemini.outputs.response }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = Number('${{ steps.pr.outputs.pr_number }}');

            const raw = (process.env.GEMINI_SUMMARY || process.env.GEMINI_RESPONSE || '').trim();

            function stripCodeFence(text) {
              return text
                .replace(/^```json\s*/i, '')
                .replace(/^```\s*/i, '')
                .replace(/\s*```$/i, '')
                .trim();
            }

            function parseGeminiJson(text) {
              const cleaned = stripCodeFence(text);
              return JSON.parse(cleaned);
            }

            function buildValidRightLines(patch) {
              const valid = new Set();
              if (!patch) return valid;

              let rightLine = null;

              for (const line of patch.split('\n')) {
                if (line.startsWith('@@')) {
                  const match = line.match(/^@@ -\d+(?:,\d+)? \+(\d+)(?:,\d+)? @@/);
                  rightLine = match ? Number(match[1]) : null;
                  continue;
                }

                if (rightLine === null) continue;

                if (line.startsWith('+') && !line.startsWith('+++')) {
                  valid.add(rightLine);
                  rightLine += 1;
                  continue;
                }

                if (line.startsWith('-') && !line.startsWith('---')) {
                  continue;
                }

                valid.add(rightLine);
                rightLine += 1;
              }

              return valid;
            }

            let parsed;
            try {
              parsed = parseGeminiJson(raw);
            } catch (error) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pull_number,
                body: [
                  'Gemini PR review 解析失敗，無法轉成行內留言。',
                  '',
                  '原始輸出如下：',
                  '```text',
                  raw.slice(0, 65000),
                  '```',
                ].join('\n'),
              });
              core.setFailed(`Failed to parse Gemini output as JSON: ${error.message}`);
              return;
            }

            const pr = await github.rest.pulls.get({
              owner,
              repo,
              pull_number,
            });

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number,
              per_page: 100,
            });

            const fileMeta = new Map(
              files.map((file) => [
                file.filename,
                {
                  status: file.status,
                  validRightLines: buildValidRightLines(file.patch || ''),
                },
              ])
            );

            const findings = Array.isArray(parsed.findings) ? parsed.findings : [];
            const reviewComments = [];
            const skipped = [];

            for (const finding of findings) {
              const path = typeof finding.path === 'string' ? finding.path : '';
              const line = Number(finding.line);
              const severity = typeof finding.severity === 'string' ? finding.severity : 'medium';
              const title = typeof finding.title === 'string' ? finding.title : '未命名問題';
              const body = typeof finding.body === 'string' ? finding.body : '';
              const meta = fileMeta.get(path);

              if (!path || !Number.isInteger(line) || !meta) {
                skipped.push({ path, line, reason: 'invalid_path_or_line' });
                continue;
              }

              if (!meta.validRightLines.has(line)) {
                skipped.push({ path, line, reason: 'line_not_in_diff' });
                continue;
              }

              reviewComments.push({
                path,
                line,
                side: 'RIGHT',
                body: `【${severity}】${title}\n\n${body}`,
              });
            }

            const summary = typeof parsed.summary === 'string' && parsed.summary.trim()
              ? parsed.summary.trim()
              : 'Gemini 已完成 PR 審查。';
            const overall = typeof parsed.overall === 'string' && parsed.overall.trim()
              ? parsed.overall.trim()
              : '已完成自動審查。';

            if (reviewComments.length > 0) {
              await github.rest.pulls.createReview({
                owner,
                repo,
                pull_number,
                commit_id: pr.data.head.sha,
                event: 'COMMENT',
                body: `### Gemini PR Review\n\n- 整體結論：${summary}\n- 總結：${overall}`,
                comments: reviewComments,
              });
              return;
            }

            const extraNote = skipped.length > 0
              ? `\n- 補充：Gemini 有 ${skipped.length} 則 finding 因為無法對應到可評論的 diff 行，未建立行內留言。`
              : '';

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: pull_number,
              body: `### Gemini PR Review\n\n- 整體結論：${summary}\n- 總結：${overall}${extraNote}`,
            });

      - name: Post fallback failure comment
        if: ${{ failure() && (steps.gemini.outcome == 'failure') }}
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number('${{ steps.pr.outputs.pr_number }}'),
              body: 'Gemini PR review 執行失敗，請檢查 workflow logs。'
            });
