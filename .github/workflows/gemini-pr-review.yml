name: Gemini PR Review

on:
  pull_request:
    branches:
      - main
      - dev
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to review
        required: true
        type: number

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.inputs.pr_number }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

permissions:
  contents: read
  id-token: write
  issues: write
  pull-requests: write
  statuses: write

jobs:
  review:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 7

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve PR context
        id: pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_PR_NUMBER: ${{ github.event.inputs.pr_number }}
          PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            PR_NUMBER="${WORKFLOW_PR_NUMBER}"
          else
            PR_NUMBER="${PULL_REQUEST_NUMBER}"
          fi

          echo "pr_number=${PR_NUMBER}" >> "${GITHUB_OUTPUT}"
          echo "repository=${REPOSITORY}" >> "${GITHUB_OUTPUT}"

          PR_DATA="$(gh pr view "${PR_NUMBER}" --repo "${REPOSITORY}" --json title,body,additions,deletions,changedFiles,baseRefName,headRefName)"
          echo "pr_data=${PR_DATA}" >> "${GITHUB_OUTPUT}"

          CHANGED_FILES="$(gh pr diff "${PR_NUMBER}" --repo "${REPOSITORY}" --name-only)"
          {
            echo "changed_files<<EOF"
            echo "${CHANGED_FILES}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Run Gemini PR review
        id: gemini
        uses: google-github-actions/run-gemini-cli@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
          PR_DATA: ${{ steps.pr.outputs.pr_data }}
          CHANGED_FILES: ${{ steps.pr.outputs.changed_files }}
          REPOSITORY: ${{ steps.pr.outputs.repository }}
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          gemini_cli_version: ${{ vars.GEMINI_CLI_VERSION || 'latest' }}
          gemini_model: gemini-2.5-flash
          settings: |-
            {
              "maxSessionTurns": 20,
              "mcpServers": {
                "github": {
                  "command": "docker",
                  "args": [
                    "run",
                    "-i",
                    "--rm",
                    "-e",
                    "GITHUB_PERSONAL_ACCESS_TOKEN",
                    "ghcr.io/github/github-mcp-server"
                  ],
                  "includeTools": [
                    "create_pending_pull_request_review",
                    "add_comment_to_pending_review",
                    "submit_pending_pull_request_review"
                  ],
                  "env": {
                    "GITHUB_PERSONAL_ACCESS_TOKEN": "${GITHUB_TOKEN}"
                  }
                }
              },
              "coreTools": [
                "run_shell_command(echo)",
                "run_shell_command(gh pr view)",
                "run_shell_command(gh pr diff)",
                "run_shell_command(cat)",
                "run_shell_command(head)",
                "run_shell_command(tail)",
                "run_shell_command(grep)"
              ],
              "telemetry": {
                "enabled": false,
                "target": "gcp"
              }
            }
          prompt: |-
            ## Role
            You are an expert code reviewer. Review this PR file by file and leave feedback directly on GitHub.

            ## Required behavior
            1. Read the PR metadata, changed file list, and diff before commenting.
            2. Focus only on files changed in the PR and only on lines inside diff hunks.
            3. Prefer inline review comments for file-specific issues.
            4. Only comment when you find a real bug, regression risk, correctness issue, security issue, or meaningful maintainability problem.
            5. Keep each comment focused on one issue and make the body concise.
            6. If there are no actionable issues, submit a short clean review summary without inventing comments.
            7. Do not approve the pull request.

            ## Steps
            1. Run echo "${REPOSITORY}" to get the repository name.
            2. Run echo "${PR_NUMBER}" to get the PR number.
            3. Run echo "${PR_DATA}" to get PR metadata.
            4. Run echo "${CHANGED_FILES}" to get the changed file list.
            5. Run gh pr diff "${PR_NUMBER}" --repo "${REPOSITORY}" to inspect the patch.
            6. For specific files you need more context on, use cat, head, tail, or grep.
            7. Create a pending review.
            8. Add inline comments for concrete issues on the corresponding changed file/line.
            9. Submit the review with a short summary of the overall findings.

            ## Comment format
            Prefix each comment with severity:
            - [critical]
            - [high]
            - [medium]
            - [low]

            ## Review priorities
            - Correctness and broken behavior
            - Edge cases and error handling
            - State sync / async issues
            - Type safety and API misuse
            - Security concerns
            - Performance problems caused by the change
            - Missing validation or unsafe assumptions

            ## Hard constraints
            - Do not leave general praise comments as inline review comments.
            - Do not comment on unchanged code.
            - Do not ask the author to "check" or "confirm" something unless you can point to a specific defect risk.
            - Do not output the review in stdout only; post it to GitHub using the review tools.

      - name: Post fallback failure comment
        if: ${{ failure() && steps.gemini.outcome == 'failure' }}
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number('${{ steps.pr.outputs.pr_number }}'),
              body: 'Gemini PR review failed. Please check the workflow logs for details.'
            });
