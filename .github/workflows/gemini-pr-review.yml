name: Gemini PR Review

on:
  pull_request:
    branches:
      - main
      - dev
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to review
        required: true
        type: number

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.inputs.pr_number }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

permissions:
  contents: read
  id-token: write
  issues: write
  pull-requests: write
  statuses: write

jobs:
  review:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 7

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve PR context
        id: pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_PR_NUMBER: ${{ github.event.inputs.pr_number }}
          PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            PR_NUMBER="${WORKFLOW_PR_NUMBER}"
          else
            PR_NUMBER="${PULL_REQUEST_NUMBER}"
          fi

          echo "pr_number=${PR_NUMBER}" >> "${GITHUB_OUTPUT}"
          echo "repository=${REPOSITORY}" >> "${GITHUB_OUTPUT}"

          PR_DATA="$(gh pr view "${PR_NUMBER}" --repo "${REPOSITORY}" --json title,body,additions,deletions,changedFiles,baseRefName,headRefName)"
          {
            echo "pr_data<<EOF"
            echo "${PR_DATA}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

          CHANGED_FILES="$(gh pr diff "${PR_NUMBER}" --repo "${REPOSITORY}" --name-only)"
          {
            echo "changed_files<<EOF"
            echo "${CHANGED_FILES}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Run Gemini PR review
        id: gemini
        uses: google-github-actions/run-gemini-cli@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          gemini_cli_version: ${{ vars.GEMINI_CLI_VERSION || 'latest' }}
          gemini_model: gemini-2.5-flash
          settings: |-
            {
              "maxSessionTurns": 20,
              "coreTools": [
                "run_shell_command(echo)",
                "run_shell_command(gh pr view)",
                "run_shell_command(gh pr diff)",
                "run_shell_command(cat)",
                "run_shell_command(head)",
                "run_shell_command(tail)",
                "run_shell_command(grep)"
              ],
              "telemetry": {
                "enabled": false,
                "target": "gcp"
              }
            }
          prompt: |-
            ## PR Context
            Repository: ${{ steps.pr.outputs.repository }}
            PR Number: ${{ steps.pr.outputs.pr_number }}

            PR Data:
            ${{ steps.pr.outputs.pr_data }}

            Changed Files:
            ${{ steps.pr.outputs.changed_files }}

            ## и§’иүІ
            дҪ жҳҜдёҖдҪҚиіҮж·ұзЁӢејҸзўјеҜ©жҹҘеҠ©жүӢгҖӮи«ӢйҖҗжӘ”еҜ©жҹҘйҖҷеҖӢ PRпјҢдёҰз”ўеҮәеҸҜзӣҙжҺҘиҪүжҲҗ GitHub inline review comments зҡ„зөҗж§ӢеҢ–зөҗжһңгҖӮ

            ## иӘһиЁҖиҰҒжұӮ
            - жүҖжңүијёеҮәдёҖеҫӢдҪҝз”Ёз№Ғй«”дёӯж–ҮпјҲzh-TWпјүгҖӮ
            - еҡҙзҰҒдҪҝз”ЁиӢұж–ҮдҪңзӮәдё»иҰҒеӣһиҰҶиӘһиЁҖпјҢйҷӨйқһжҳҜзЁӢејҸзўјгҖҒжҢҮд»ӨгҖҒжӘ”еҗҚгҖҒAPI еҗҚзЁұжҲ–еҝ…иҰҒжҠҖиЎ“еҗҚи©һгҖӮ

            ## еҜ©жҹҘеҺҹеүҮ
            1. е…Ҳй–ұи®ҖдёҠж–№зҡ„ PR metadata иҲҮ changed filesгҖӮ
            2. еҹ·иЎҢ `gh pr diff "${{ steps.pr.outputs.pr_number }}" --repo "${{ steps.pr.outputs.repository }}"` жӘўжҹҘ patchгҖӮ
            3. иӢҘйңҖиҰҒиЈңе……дёҠдёӢж–ҮпјҢеҸӘиғҪйҮқе°Қи®Ҡжӣҙзӣёй—ңжӘ”жЎҲдҪҝз”Ё `cat`гҖҒ`head`гҖҒ`tail`гҖҒ`grep`гҖӮ
            4. еҸӘжҢҮеҮәзңҹеҜҰдё”еҸҜеҹ·иЎҢзҡ„е•ҸйЎҢпјҡеҠҹиғҪйҢҜиӘӨгҖҒеӣһжӯёйўЁйҡӘгҖҒжӯЈзўәжҖ§е•ҸйЎҢгҖҒе®үе…ЁжҖ§е•ҸйЎҢгҖҒеһӢеҲҘ/API иӘӨз”ЁпјҢжҲ–жҳҺйЎҜзҡ„з¶ӯиӯ·жҖ§йўЁйҡӘгҖӮ
            5. еҸӘйҮқе°Қ diff hunk е…§гҖҒдё”д»ҚеӯҳеңЁж–ј PR head зүҲжң¬зҡ„иЎҢеҒҡи©•и«–пјӣдёҚиҰҒи©•и«–жңӘи®ҠжӣҙдҪҚзҪ®гҖӮ
            6. жҜҸеҖӢ finding еҸӘи¬ӣдёҖеҖӢе•ҸйЎҢпјҢе…§е®№зІҫз°ЎгҖҒе…·й«”гҖҒеҸҜеҹ·иЎҢгҖӮ
            7. еҰӮжһңжІ’жңүеҸҜеҹ·иЎҢзҡ„е•ҸйЎҢпјҢ`findings` еӣһеӮіз©әйҷЈеҲ—гҖӮ

            ## иЎҢиҷҹиҰҒжұӮ
            - `line` еҝ…й ҲеЎ«е…Ҙ PR diff дёӯеҸҜи©•и«–зҡ„гҖҢж–°жӘ”жЎҲзүҲжң¬гҖҚиЎҢиҷҹпјҲеҚіи©ІиЎҢеңЁ HEAD зүҲжң¬жӘ”жЎҲдёӯзҡ„зө•е°ҚиЎҢиҷҹпјүгҖӮ
            - еҸӘдҪҝз”Ёе–®иЎҢи©•и«–пјҢдёҚиҰҒијёеҮә multi-line rangeгҖӮ
            - `path` еҝ…й ҲжҳҜ repository root зӣёе°Қи·Ҝеҫ‘пјҢдҫӢеҰӮ `app/components/PlayClient.tsx`гҖӮ
            - **иЎҢиҷҹиЁҲз®—ж–№ејҸ**пјҡе…ҲзңӢ diff hunk header `@@ -A,B +C,D @@`пјҢC жҳҜи©І hunk еңЁж–°жӘ”жЎҲдёӯзҡ„иө·е§ӢиЎҢиҷҹгҖӮеҫһ C й–Ӣе§ӢпјҢжҜҸйҒҮеҲ°дёҖиЎҢдёҠдёӢж–ҮиЎҢпјҲз©әж јй–Ӣй ӯпјүжҲ–ж–°еўһиЎҢпјҲ`+` й–Ӣй ӯпјүе°ұ +1пјҢйҒҮеҲ°еҲӘйҷӨиЎҢпјҲ`-` й–Ӣй ӯпјүдёҚиЁҲе…ҘгҖӮйҖҷжЁЈеҸҜеҫ—еҲ°жҜҸдёҖиЎҢеңЁж–°жӘ”жЎҲзҡ„зө•е°ҚиЎҢиҷҹгҖӮ
            - иӢҘдёҚзўәе®ҡиЎҢиҷҹпјҢи«ӢдҪҝз”Ё `grep -n "й—ңйҚөеӯ—" path/to/file` еңЁ HEAD зүҲжң¬жӘ”жЎҲдёӯзўәиӘҚеҫҢеҶҚеЎ«е…ҘгҖӮ
            - `line` еҸӘиғҪеЎ«е…Ҙ diff дёӯеҜҰйҡӣеҮәзҸҫпјҲдёҠдёӢж–ҮиЎҢжҲ– `+` ж–°еўһиЎҢпјүзҡ„иЎҢиҷҹпјҢдёҚиғҪеЎ«е…Ҙ `-` еҲӘйҷӨиЎҢзҡ„иЎҢиҷҹгҖӮ

            ## еҡҙйҮҚеәҰе°ҚжҮү
            - `high`пјҡй«ҳйўЁйҡӘпјҢжҮүе„Әе…Ҳдҝ®жӯЈ
            - `medium`пјҡдёӯзӯүйўЁйҡӘпјҢжҮүе®үжҺ’дҝ®жӯЈ
            - `low`пјҡдҪҺйўЁйҡӘпјҢеҸҜеҫҢзәҢж”№е–„

            ## ијёеҮәж јејҸ
            еҸӘиғҪијёеҮә JSONпјҢдёҚиғҪжңү markdown code fenceгҖҒдёҚиғҪжңүеүҚиЁҖгҖҒдёҚиғҪжңүйЎҚеӨ–иӘӘжҳҺгҖӮ
            JSON schema еҰӮдёӢпјҡ
            {
              "summary": "з№Ғй«”дёӯж–Үзҡ„дёҖеҸҘи©ұзёҪзөҗ",
              "overall": "з№Ғй«”дёӯж–Үзҡ„ 1-3 еҸҘ review зёҪзөҗ",
              "findings": [
                {
                  "path": "зӣёе°Қи·Ҝеҫ‘",
                  "line": 123,
                  "severity": "high | medium | low",
                  "title": "з№Ғй«”дёӯж–ҮзҹӯжЁҷйЎҢ",
                  "body": "з№Ғй«”дёӯж–Үи©•и«–е…§е®№пјҢдёҖж®өеҚіеҸҜ"
                }
              ]
            }

      - name: Create inline review comments
        if: ${{ success() }}
        uses: actions/github-script@v8
        env:
          GEMINI_SUMMARY: ${{ steps.gemini.outputs.summary }}
          GEMINI_RESPONSE: ${{ steps.gemini.outputs.response }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = Number('${{ steps.pr.outputs.pr_number }}');

            const raw = (process.env.GEMINI_SUMMARY || process.env.GEMINI_RESPONSE || '').trim();

            function stripCodeFence(text) {
              return text
                .replace(/^```json\s*/i, '')
                .replace(/^```\s*/i, '')
                .replace(/\s*```$/i, '')
                .trim();
            }

            function parseGeminiJson(text) {
              const cleaned = stripCodeFence(text);
              return JSON.parse(cleaned);
            }

            function buildValidRightLines(patch) {
              const valid = new Set();
              if (!patch) return valid;

              let rightLine = null;

              for (const line of patch.split('\n')) {
                if (line.startsWith('@@')) {
                  const match = line.match(/^@@ -\d+(?:,\d+)? \+(\d+)(?:,\d+)? @@/);
                  rightLine = match ? Number(match[1]) : null;
                  continue;
                }

                if (rightLine === null) continue;

                if (line.startsWith('+') && !line.startsWith('+++')) {
                  valid.add(rightLine);
                  rightLine += 1;
                  continue;
                }

                if (line.startsWith('-') && !line.startsWith('---')) {
                  continue;
                }

                valid.add(rightLine);
                rightLine += 1;
              }

              return valid;
            }

            let parsed;
            try {
              parsed = parseGeminiJson(raw);
            } catch (error) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pull_number,
                body: [
                  'Gemini PR review и§ЈжһҗеӨұж•—пјҢз„Ўжі•иҪүжҲҗиЎҢе…§з•ҷиЁҖгҖӮ',
                  '',
                  'еҺҹе§ӢијёеҮәеҰӮдёӢпјҡ',
                  '```text',
                  raw.slice(0, 65000),
                  '```',
                ].join('\n'),
              });
              core.setFailed(`Failed to parse Gemini output as JSON: ${error.message}`);
              return;
            }

            const pr = await github.rest.pulls.get({
              owner,
              repo,
              pull_number,
            });

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number,
              per_page: 100,
            });

            const fileMeta = new Map(
              files.map((file) => [
                file.filename,
                {
                  status: file.status,
                  validRightLines: buildValidRightLines(file.patch || ''),
                },
              ])
            );

            const findings = Array.isArray(parsed.findings) ? parsed.findings : [];
            const reviewComments = [];
            const skipped = [];

            for (const finding of findings) {
              const path = typeof finding.path === 'string' ? finding.path : '';
              const line = Number(finding.line);
              const severity = typeof finding.severity === 'string' ? finding.severity : 'medium';
              const title = typeof finding.title === 'string' ? finding.title : 'жңӘе‘ҪеҗҚе•ҸйЎҢ';
              const body = typeof finding.body === 'string' ? finding.body : '';
              const meta = fileMeta.get(path);

              if (!path || !Number.isInteger(line) || !meta) {
                skipped.push({ path, line, reason: 'invalid_path_or_line' });
                continue;
              }

              if (!meta.validRightLines.has(line)) {
                skipped.push({ path, line, reason: 'line_not_in_diff' });
                continue;
              }

              reviewComments.push({
                path,
                line,
                side: 'RIGHT',
                body: `гҖҗ${severity}гҖ‘${title}\n\n${body}`,
              });
            }

            const summary = typeof parsed.summary === 'string' && parsed.summary.trim()
              ? parsed.summary.trim()
              : 'Gemini е·Іе®ҢжҲҗ PR еҜ©жҹҘгҖӮ';
            const overall = typeof parsed.overall === 'string' && parsed.overall.trim()
              ? parsed.overall.trim()
              : 'е·Іе®ҢжҲҗиҮӘеӢ•еҜ©жҹҘгҖӮ';

            if (reviewComments.length > 0) {
              await github.rest.pulls.createReview({
                owner,
                repo,
                pull_number,
                commit_id: pr.data.head.sha,
                event: 'COMMENT',
                body: `### Gemini PR Review\n\n- ж•ҙй«”зөҗи«–пјҡ${summary}\n- зёҪзөҗпјҡ${overall}`,
                comments: reviewComments,
              });
              return;
            }

            const extraNote = skipped.length > 0
              ? `\n- иЈңе……пјҡGemini жңү ${skipped.length} еүҮ finding еӣ зӮәз„Ўжі•е°ҚжҮүеҲ°еҸҜи©•и«–зҡ„ diff иЎҢпјҢжңӘе»әз«ӢиЎҢе…§з•ҷиЁҖгҖӮ`
              : '';

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: pull_number,
              body: `### Gemini PR Review\n\n- ж•ҙй«”зөҗи«–пјҡ${summary}\n- зёҪзөҗпјҡ${overall}${extraNote}`,
            });

      - name: Post fallback failure comment
        if: ${{ failure() && (steps.gemini.outcome == 'failure') }}
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number('${{ steps.pr.outputs.pr_number }}'),
              body: 'Gemini PR review еҹ·иЎҢеӨұж•—пјҢи«ӢжӘўжҹҘ workflow logsгҖӮ'
            });
